name: Build & Release

on:
  push:
    tags:
      - "v*"          # es. v1.0.0-beta, v1.0.1

permissions:
  contents: write   # necessario per creare la Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Windows
        run: flet build windows --no-rich-output
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"

      - name: Zip artifact
        run: Compress-Archive -Path build\windows\* -DestinationPath kotoba-travel-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: kotoba-travel-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Linux
        run: echo "y" | flet build linux --no-rich-output

      - name: Tar artifact
        run: tar -czf kotoba-travel-linux.tar.gz -C build/linux .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: kotoba-travel-linux.tar.gz

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-build

      - uses: actions/download-artifact@v4
        with:
          name: linux-build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kotoba Travel ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            kotoba-travel-windows.zip
            kotoba-travel-linux.tar.gz
          body: |
            ## Kotoba Travel ${{ github.ref_name }}

            ### Download
            - **Windows**: `kotoba-travel-windows.zip` → estrai e avvia `KotobaTravel.exe`
            - **Linux**: `kotoba-travel-linux.tar.gz` → estrai, `chmod +x KotobaTravel`, avvia

            ### Note beta
            Feedback e bug? Aprire una Issue su GitHub oppure contattare direttamente.