name: Build & Release

on:
  push:
    tags:
      - "v*"          # es. v1.0.0, v1.1.0-beta

permissions:
  contents: write   # necessario per creare la Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Windows
        shell: cmd
        run: echo y | flet build windows --module-name run --no-rich-output
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"

      - name: Create installer
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" kotoba_travel.iss'

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: KotobaTravel-Setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev ninja-build cmake clang pkg-config

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Linux
        run: echo "y" | flet build linux --module-name run --no-rich-output

      - name: Download linuxdeploy
        run: |
          wget -q -O linuxdeploy-x86_64.AppImage \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q -O linuxdeploy-plugin-gtk.sh \
            "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh
          sudo apt-get install -y libfuse2

      - name: Create AppImage
        run: |
          BUNDLE=$(find build/linux -name "kotoba_travel" -type f | head -1 | xargs dirname)
          BUNDLE_DIR=$(dirname "$BUNDLE")

          mkdir -p AppDir/usr/bin AppDir/usr/lib
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp -r "$BUNDLE_DIR/bundle/lib/"* AppDir/usr/lib/ 2>/dev/null || \
          cp -r "$BUNDLE_DIR/lib/"* AppDir/usr/lib/ 2>/dev/null || true

          cp -r "$BUNDLE_DIR/bundle/data" AppDir/usr/bin/ 2>/dev/null || \
          cp -r "$BUNDLE_DIR/data" AppDir/usr/bin/ 2>/dev/null || true

          EXEC=$(find build/linux -name "kotoba_travel" -type f | head -1)
          cp "$EXEC" AppDir/usr/bin/kotoba_travel

          cat > AppDir/usr/share/applications/kotoba_travel.desktop << 'EOF'
          [Desktop Entry]
          Name=Kotoba Travel
          Exec=kotoba_travel
          Icon=kotoba_travel
          Type=Application
          Categories=Education;
          EOF

          cp src/asset/image/icons/icona.png \
            AppDir/usr/share/icons/hicolor/256x256/apps/kotoba_travel.png

          DEPLOY_GTK_VERSION=3 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir --plugin gtk --output appimage
        env:
          ARCH: x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "*.AppImage"

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer

      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kotoba Travel ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            KotobaTravel-Setup.exe
            *.AppImage
          body: |
            ## Kotoba Travel ${{ github.ref_name }}

            ### Download
            - **Windows**: `KotobaTravel-Setup.exe` → doppio click, installa e avvia
            - **Linux**: `KotobaTravel-x86_64.AppImage` → `chmod +x` e doppio click

            ### Note
            Feedback e bug? Apri una Issue su GitHub.
